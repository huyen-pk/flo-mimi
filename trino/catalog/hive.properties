connector.name=hive
hive.metastore=file
hive.metastore.catalog.dir=/var/lib/trino/hive-metastore

# Trino 468 needs Hadoop-backed filesystem mode for file-metastore local paths
# and legacy S3 access in the same Hive catalog.
fs.hadoop.enabled=true
hive.s3.endpoint=http://minio:9000
hive.s3.aws-access-key=${ENV:MINIO_ROOT_USER}
hive.s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
hive.s3.path-style-access=true
hive.s3.region=us-east-1
hive.s3.ssl.enabled=false
