connector.name=iceberg
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://catalog-db:5432/${ENV:CATALOG_DB}
iceberg.jdbc-catalog.connection-user=${ENV:CATALOG_USER}
iceberg.jdbc-catalog.connection-password=${ENV:CATALOG_PASSWORD}
iceberg.jdbc-catalog.catalog-name=local
iceberg.jdbc-catalog.default-warehouse-dir=s3://data-lake/lakehouse
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
s3.path-style-access=true
s3.region=us-east-1