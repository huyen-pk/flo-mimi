services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr=PLAINTEXT://0.0.0.0:8082
      - --advertise-pandaproxy-addr=PLAINTEXT://redpanda:8082
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - stream_net

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        rpk topic create email_events_raw --brokers=redpanda:9092 || true
        rpk topic create analytics_events_raw --brokers=redpanda:9092 || true
    restart: "no"
    networks:
      - stream_net

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - minio_data:/data
    networks:
      - stream_net
      - batch_net
      - lakehouse_net

  minio-init:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minio} ${MINIO_ROOT_PASSWORD:-minio123}
        mc mb --ignore-existing local/data-lake
    restart: "no"
    networks:
      - stream_net
      - batch_net
      - lakehouse_net

  appdb:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${APPDB_DB:-analytics}
      POSTGRES_USER: ${APPDB_USER:-analytics}
      POSTGRES_PASSWORD: ${APPDB_PASSWORD:-analytics}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APPDB_USER:-analytics} -d ${APPDB_DB:-analytics}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - appdb_data:/var/lib/postgresql/data
      - ./appdb/init:/docker-entrypoint-initdb.d:ro
    networks:
      - serving_net
      - batch_net
      - lakehouse_net

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${CATALOG_DB:-iceberg}
      POSTGRES_USER: ${CATALOG_USER:-iceberg}
      POSTGRES_PASSWORD: ${CATALOG_PASSWORD:-iceberg}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_USER:-iceberg} -d ${CATALOG_DB:-iceberg}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - catalog_data:/var/lib/postgresql/data
    networks:
      - lakehouse_net

  clickhouse:
    image: clickhouse/clickhouse-server:25.1
    ports:
      - "8123:8123"
      - "9002:9000"
    environment:
      CLICKHOUSE_DB: serving
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - serving_net
      - lakehouse_net
      - stream_net

  trino:
    image: trinodb/trino:468
    depends_on:
      appdb:
        condition: service_healthy
      catalog-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      APPDB_DB: ${APPDB_DB:-analytics}
      APPDB_USER: ${APPDB_USER:-analytics}
      APPDB_PASSWORD: ${APPDB_PASSWORD:-analytics}
      CATALOG_DB: ${CATALOG_DB:-iceberg}
      CATALOG_USER: ${CATALOG_USER:-iceberg}
      CATALOG_PASSWORD: ${CATALOG_PASSWORD:-iceberg}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - ./trino/config.properties:/etc/trino/config.properties:ro
      - ./trino/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/node.properties:/etc/trino/node.properties:ro
      - ./trino/catalog:/etc/trino/catalog:ro
    networks:
      - lakehouse_net
      - serving_net

  event-gateway:
    image: flomimi/event-gateway:local
    build:
      context: ./event-gateway
    environment:
      APP_PORT: 8000
      REDPANDA_BROKERS: redpanda:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: event-gateway
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ingress_net
      - stream_net

  platform:
    image: flomimi/platform:local
    build:
      context: ./platform
    environment:
      PORT: 8081
      EVENT_GATEWAY_BASE_URL: http://event-gateway:8000
      PLATFORM_ENVIRONMENT: local
      APPDB_DSN: postgresql://${APPDB_USER:-analytics}:${APPDB_PASSWORD:-analytics}@appdb:5432/${APPDB_DB:-analytics}?sslmode=disable
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: platform
    depends_on:
      event-gateway:
        condition: service_healthy
      appdb:
        condition: service_healthy
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ingress_net
      - serving_net

  stream-loader:
    image: ${STREAM_LOADER_IMAGE:-docker.redpanda.com/redpandadata/connect:latest}
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    command: run /connect.yaml
    volumes:
      - ./redpanda-connect/connect.yaml:/connect.yaml:ro
    networks:
      - stream_net

  mock-third-party-api:
    image: flomimi/mock-third-party-api:local
    build:
      context: ./mock-third-party-api
    environment:
      APP_PORT: 8010
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: mock-third-party-api
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - batch_net

  dagster-webserver:
    image: flomimi/dagster:local
    build:
      context: ./dagster
    command: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "/opt/dagster/app/workspace.yaml"]
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: data-lake
      THIRD_PARTY_API_BASE_URL: http://mock-third-party-api:8010
      APPDB_DSN: postgresql://${APPDB_USER:-analytics}:${APPDB_PASSWORD:-analytics}@appdb:5432/${APPDB_DB:-analytics}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      DBT_PROJECT_DIR: /opt/dagster/app/dbt
      DBT_PROFILES_DIR: /opt/dagster/app/dbt
      DBT_HOST: appdb
      DBT_PORT: 5432
      DBT_DBNAME: ${APPDB_DB:-analytics}
      DBT_USER: ${APPDB_USER:-analytics}
      DBT_PASSWORD: ${APPDB_PASSWORD:-analytics}
      DBT_SCHEMA: analytics
      DAGSTER_METRICS_PORT: 9109
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: dagster-webserver
    depends_on:
      minio-init:
        condition: service_completed_successfully
      appdb:
        condition: service_healthy
      clickhouse:
        condition: service_started
      mock-third-party-api:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - dagster_home:/opt/dagster/dagster_home
    networks:
      - batch_net
      - lakehouse_net
      - serving_net

  dagster-daemon:
    image: flomimi/dagster:local
    command: ["dagster-daemon", "run", "-w", "/opt/dagster/app/workspace.yaml"]
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: data-lake
      THIRD_PARTY_API_BASE_URL: http://mock-third-party-api:8010
      APPDB_DSN: postgresql://${APPDB_USER:-analytics}:${APPDB_PASSWORD:-analytics}@appdb:5432/${APPDB_DB:-analytics}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
      DBT_PROJECT_DIR: /opt/dagster/app/dbt
      DBT_PROFILES_DIR: /opt/dagster/app/dbt
      DBT_HOST: appdb
      DBT_PORT: 5432
      DBT_DBNAME: ${APPDB_DB:-analytics}
      DBT_USER: ${APPDB_USER:-analytics}
      DBT_PASSWORD: ${APPDB_PASSWORD:-analytics}
      DBT_SCHEMA: analytics
      DAGSTER_METRICS_PORT: 9108
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: dagster-daemon
    depends_on:
      dagster-webserver:
        condition: service_started
    volumes:
      - dagster_home:/opt/dagster/dagster_home
    networks:
      - batch_net
      - lakehouse_net
      - serving_net

  dbt:
    image: flomimi/dagster:local
    command: ["dbt", "debug", "--project-dir", "/opt/dagster/app/dbt", "--profiles-dir", "/opt/dagster/app/dbt"]
    profiles:
      - tools
    environment:
      DBT_HOST: appdb
      DBT_PORT: 5432
      DBT_DBNAME: ${APPDB_DB:-analytics}
      DBT_USER: ${APPDB_USER:-analytics}
      DBT_PASSWORD: ${APPDB_PASSWORD:-analytics}
      DBT_SCHEMA: analytics
    depends_on:
      appdb:
        condition: service_healthy
    networks:
      - lakehouse_net
      - serving_net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel-collector/config.yaml"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - observability_net
      - ingress_net
      - batch_net
      - serving_net

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - observability_net
      - ingress_net
      - stream_net
      - batch_net
      - lakehouse_net
      - serving_net

  grafana:
    image: grafana/grafana:11.2.2
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    ports:
      - "3001:3000"
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - observability_net

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    networks:
      - observability_net

  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo/config.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ./observability/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - observability_net

  promtail:
    image: grafana/promtail:3.1.1
    user: root
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - observability_net

  appdb-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_NAME: postgresql://${APPDB_USER:-analytics}:${APPDB_PASSWORD:-analytics}@appdb:5432/${APPDB_DB:-analytics}?sslmode=disable
    depends_on:
      appdb:
        condition: service_healthy
    networks:
      - observability_net
      - serving_net

  catalog-db-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_NAME: postgresql://${CATALOG_USER:-iceberg}:${CATALOG_PASSWORD:-iceberg}@catalog-db:5432/${CATALOG_DB:-iceberg}?sslmode=disable
    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - observability_net
      - lakehouse_net

volumes:
  redpanda_data:
  minio_data:
  appdb_data:
  catalog_data:
  clickhouse_data:
  dagster_home:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  ingress_net:
  stream_net:
  batch_net:
  lakehouse_net:
  serving_net:
  observability_net: